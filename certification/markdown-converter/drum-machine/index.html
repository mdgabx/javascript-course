<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Drum Machine</title>
  </head>
  <body>
    <div id="drum-machine">
      <div id="pad-bank">
        <button class="drum-pad">Q
          <audio class="clip" src="" id="Q"></audio>
        </button>
        <button class="drum-pad">W
           <audio class="clip" src="" id="W"></audio>
        </button>
        <button class="drum-pad">E
           <audio class="clip" src="" id="E"></audio>
        </button>
        <button class="drum-pad">A
           <audio class="clip" src="" id="A"></audio>
        </button>
        <button class="drum-pad">S
          <audio class="clip" src="" id="S"></audio>
        </button>
        <button class="drum-pad">D
           <audio class="clip" src="" id="D"></audio>
        </button>
        <button class="drum-pad">Z
           <audio class="clip" src="" id="Z"></audio>
        </button>
        <button class="drum-pad">X
           <audio class="clip" src="" id="X"></audio>
        </button>
        <button class="drum-pad">C
           <audio class="clip" src="" id="C"></audio>
        </button>
      </div>
      <p id="display"></p>
    </div>
  </body>
</html>
